[build]
  command = "bun run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[dev]
  command = "bun run dev"
  port = 8888
  targetPort = 5173
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
